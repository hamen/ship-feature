<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1600px; height:560px; }
  body {
    font-family: "Inter","SF Pro Display","Segoe UI",system-ui,sans-serif;
    width:1600px; height:560px; overflow:hidden; position:relative;
    background:
      radial-gradient(1200px 600px at 12% -10%, rgba(124,92,255,0.55), transparent 60%),
      radial-gradient(1000px 700px at 95% 120%, rgba(34,211,238,0.40), transparent 55%),
      radial-gradient(900px 600px at 80% -20%, rgba(244,114,182,0.28), transparent 60%),
      linear-gradient(135deg,#0a0e1f 0%, #141033 45%, #0b1a2e 100%);
    color:#eef2ff;
  }
  /* dotted texture */
  body::before{
    content:""; position:absolute; inset:0;
    background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 26px 26px; opacity:.6;
  }
  .wrap{ position:relative; z-index:1; height:100%; padding:64px 72px; display:flex; flex-direction:column; justify-content:space-between; }
  .top{ display:flex; align-items:flex-start; justify-content:space-between; }
  h1{ font-size:104px; font-weight:800; letter-spacing:-3px; line-height:.95;
      background:linear-gradient(92deg,#ffffff,#c7d2fe 40%,#a78bfa 70%,#22d3ee);
      -webkit-background-clip:text; background-clip:text; color:transparent; }
  .tag{ margin-top:18px; font-size:30px; font-weight:500; color:#c7d2fe; max-width:900px; line-height:1.3; }
  .mono{ font-family:"JetBrains Mono","SF Mono",ui-monospace,monospace; }
  .cli{ align-self:flex-start; margin-top:8px; white-space:nowrap; background:rgba(2,6,23,.55); border:1px solid rgba(148,163,184,.28);
        border-radius:14px; padding:16px 22px; font-size:24px; color:#a5b4fc; }
  /* CSS traffic light for the human gates (color emoji doesn't render in headless chrome) */
  .tl{ display:inline-flex; gap:6px; align-items:center; }
  .tl i{ width:12px; height:12px; border-radius:50%; display:inline-block; }
  .tl .r{ background:#ef4444; } .tl .y{ background:#f59e0b; } .tl .g{ background:#22c55e; }
  .cli b{ color:#e2e8f0; font-weight:600; }
  /* pipeline */
  .pipe{ display:flex; align-items:center; gap:14px; flex-wrap:nowrap; }
  .node{ display:flex; align-items:center; gap:12px; padding:16px 22px; border-radius:16px; font-size:26px; font-weight:600;
         background:rgba(255,255,255,0.06); border:1px solid rgba(148,163,184,.25); white-space:nowrap; }
  .node .dot{ width:14px; height:14px; border-radius:50%; }
  .arrow{ color:#64748b; font-size:30px; }
  .gate{ background:linear-gradient(180deg, rgba(251,191,36,.22), rgba(251,146,60,.14));
         border:1.5px solid rgba(251,191,36,.6); color:#fde68a; font-size:30px; padding:16px 20px; }
  .agents{ display:flex; gap:14px; align-items:center; }
  .chip{ display:flex; align-items:center; gap:10px; padding:10px 18px; border-radius:999px; font-size:24px; font-weight:600;
         background:rgba(255,255,255,.06); border:1px solid rgba(148,163,184,.25); }
  .chip .d{ width:13px; height:13px; border-radius:50%; }
  .foot{ display:flex; align-items:center; justify-content:space-between; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>ship&#8209;feature</h1>
        <div class="tag">One gated workflow for shipping any change — followed by every AI agent you drive.</div>
      </div>
      <div class="cli mono">$ <b>ship-feature</b> relay --author claude</div>
    </div>

    <div class="pipe">
      <div class="node"><span class="dot" style="background:#38bdf8"></span>Plan</div>
      <span class="arrow">&rarr;</span>
      <div class="node"><span class="dot" style="background:#818cf8"></span>Review</div>
      <span class="arrow">&rarr;</span>
      <div class="node gate"><span class="tl"><i class="r"></i><i class="y"></i><i class="g"></i></span>approve</div>
      <span class="arrow">&rarr;</span>
      <div class="node"><span class="dot" style="background:#34d399"></span>PR</div>
      <span class="arrow">&rarr;</span>
      <div class="node"><span class="dot" style="background:#f472b6"></span>Cross&#8209;review</div>
      <span class="arrow">&rarr;</span>
      <div class="node gate"><span class="tl"><i class="r"></i><i class="y"></i><i class="g"></i></span>merge</div>
      <span class="arrow">&rarr;</span>
      <div class="node"><span class="dot" style="background:#22d3ee"></span>Verify</div>
    </div>

    <div class="foot">
      <div class="agents">
        <div class="chip"><span class="d" style="background:#a78bfa"></span>Claude</div>
        <div class="chip"><span class="d" style="background:#34d399"></span>Codex</div>
        <div class="chip"><span class="d" style="background:#38bdf8"></span>Cursor</div>
        <div class="chip"><span class="d" style="background:#fb923c"></span>Antigravity</div>
      </div>
      <div class="mono" style="color:#64748b;font-size:22px">two human gates &middot; the agent never self-merges</div>
    </div>
  </div>
</body>
</html>
