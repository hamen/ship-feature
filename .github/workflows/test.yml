name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # macOS validates the Bash 3.2 target that Ubuntu's Bash 5 cannot.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Test the exact reviewed code — the PR head SHA, not GitHub's synthetic merge commit.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: syntax check
        run: |
          for f in bin/ship-feature install.sh scripts/*.sh test/*.sh; do bash -n "$f"; done
      - name: tests
        run: bash test/test-ship-feature.sh
      - name: generic leak scan (emails / home paths)
        run: bash scripts/scan-generic.sh

  secrets:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      # Generic secret scanner (complements scan-generic.sh, which covers emails/home paths). Free for
      # individual accounts and public repos. NOTE: consider pinning to an immutable commit SHA.
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
